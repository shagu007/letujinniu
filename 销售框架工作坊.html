<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售框架工作坊 - 7步填写</title>
<style>
:root {
  --bg:#f5f6fa; --card:#fff; --primary:#4f6ef7; --primary-light:#eef1ff;
  --danger:#e74c3c; --warning:#f39c12; --success:#27ae60;
  --text:#2c3e50; --text-secondary:#7f8c8d; --border:#e8ecf1;
  --shadow:0 2px 12px rgba(0,0,0,0.06); --radius:10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.app { max-width:800px; margin:0 auto; padding:16px; }

.header { background:var(--card); padding:16px 20px; border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:18px; }
.step-nav { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
.step-nav button { padding:6px 12px; border:1px solid var(--border); background:var(--card); border-radius:6px; cursor:pointer; font-size:12px; white-space:nowrap; transition:0.2s; }
.step-nav button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.step-nav button.done { border-color:var(--success); color:var(--success); }
.step-nav button.done::after { content:' ✓'; }

.card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:16px; }
.card h2 { font-size:16px; margin-bottom:4px; color:var(--primary); }
.card .subtitle { font-size:13px; color:var(--text-secondary); margin-bottom:16px; }
.card h3 { font-size:14px; margin:16px 0 8px; color:var(--text); }

.info-box { background:#fff8e1; border-left:4px solid var(--warning); padding:12px 16px; border-radius:4px; margin-bottom:16px; font-size:13px; }
.info-box strong { color:var(--warning); }

.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:5px; }
.form-group label .q-num { display:inline-block; background:var(--primary); color:#fff; border-radius:10px; width:18px; height:18px; text-align:center; line-height:18px; font-size:11px; margin-right:6px; }
.form-group textarea { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:6px; font-size:14px; font-family:inherit; resize:vertical; min-height:56px; transition:0.2s; }
.form-group textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,110,247,0.1); }
.form-group textarea.filled { border-color:var(--success); background:#f9fdf9; }
.form-group .hint { font-size:11px; color:var(--text-secondary); margin-top:3px; }

.template-box { background:#f0f4ff; border-radius:8px; padding:14px; margin-bottom:16px; font-size:13px; white-space:pre-wrap; border:1px dashed var(--primary); }
.template-box .label { font-size:10px; color:var(--primary); font-weight:600; text-transform:uppercase; margin-bottom:6px; }

.btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:0.2s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { opacity:0.9; }
.btn-outline { background:#fff; color:var(--primary); border:1px solid var(--primary); }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }

.bottom-bar { display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); gap:8px; flex-wrap:wrap; }
.progress { font-size:12px; color:var(--text-secondary); }
.progress-bar { width:100%; height:4px; background:var(--border); border-radius:2px; margin-top:8px; }
.progress-bar .fill { height:100%; background:var(--primary); border-radius:2px; transition:0.3s; }

.toast { position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:8px; color:#fff; font-size:14px; z-index:200; animation:slideIn 0.3s ease; }
.toast.success { background:var(--success); }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

.export-preview { background:#1e1e1e; color:#d4d4d4; padding:16px; border-radius:8px; font-size:12px; white-space:pre-wrap; max-height:400px; overflow-y:auto; margin-top:12px; font-family:monospace; }

@media (max-width:600px) {
  .step-nav button { font-size:10px; padding:4px 6px; }
  .header h1 { font-size:15px; }
}
</style>
</head>
<body>

<div class="app" id="app"></div>
<div id="toast-container"></div>

<script>
// ============ 数据结构 ============
const STEPS = [
  {
    id:1, title:'开场破冰', icon:'🧊',
    subtitle:'下单后30分钟内 — 让顾客知道有专人在服务他',
    templates: [
      { label:'初始话术模板', text:'[称呼]，刚看到您在 [主播名] 直播间下单了 [目的地] 的线路。\n我是您的专属旅行管家 [你的名字]，这条线后续全程由我跟您对接。\n您先不用急着定时间——先把我的微信加上，有任何问题随时找我。' }
    ],
    questions: [
      { id:'q1_1', label:'你们直播间主要卖哪些线路？（列2-3条主力线）', hint:'比如：三亚5天4晚、云南6天5晚、日本7天6晚' },
      { id:'q1_2', label:'你的岗位名称你自己喜欢怎么称呼？', hint:'比如：旅游管家、旅行顾问、专属客服' },
      { id:'q1_3', label:'你加微信时发文字还是语音？', hint:'文字正式但冰冷，语音亲切但顾客可能不方便听' },
      { id:'q1_4', label:'顾客最常问的第一个问题是什么？', hint:'比如：多少钱？什么时候出发？能便宜吗？' }
    ]
  },
  {
    id:2, title:'挖掘需求', icon:'🔍',
    subtitle:'第一次深入聊天 — 搞清楚他到底想要什么',
    templates: [
      { label:'5个黄金提问', text:'1. "您这次是带家人、朋友，还是自己出去放松？"\n2. "以前出去玩过哪些地方？有没有哪次觉得特别好或不太满意的？"\n3. "这次有没有什么特别的事要庆祝？比如纪念日、生日？"\n4. "不考虑预算的话，您梦想中的这次旅行是什么样子？"\n5. "对您来说，性价比和省心省事，哪个更重要？"' }
    ],
    questions: [
      { id:'q2_1', label:'你们的线路偏高端还是性价比？', hint:'决定你在聊天中如何定位产品价值' },
      { id:'q2_2', label:'你的客户以什么类型为主？', hint:'家庭出游 / 情侣蜜月 / 老年团 / 闺蜜打卡 / 公司团建' },
      { id:'q2_3', label:'顾客说了什么让你觉得"这个人大概率会买"？', hint:'可能是某种语气、某个具体需求、某个行为信号' },
      { id:'q2_4', label:'顾客说了什么让你心里咯噔一下觉得"这单要凉"？', hint:'比如：我随便看看、不着急、我再对比一下' }
    ]
  },
  {
    id:3, title:'塑造价值', icon:'💎',
    subtitle:'让他"看到"旅行画面，而不是"听到"行程和价格',
    templates: [
      { label:'FAB三段式话术', text:'[称呼]，根据您刚才说的 [复述他的需求]，我帮您梳理了一下。这条线最匹配您的有3个点：\n\n1️⃣ [核心卖点A] — 比如"别人住快捷酒店，您住洱海边带阳台的民宿"\n   → 对您的意义：[一句话说清给他的体验]\n\n2️⃣ [核心卖点B] — 比如"这条线的导游是当地人，不带去购物店"\n   → 对您的意义：[一句话说清给他的体验]\n\n3️⃣ [核心卖点C] — 比如"我们跟酒店签了独家，旺季不涨价"\n   → 对您的意义：[一句话说清给他的体验]' }
    ],
    questions: [
      { id:'q3_1', label:'你们线路最大的3个卖点是什么？', hint:'比如：独家酒店资源、纯玩无购物、当地特色体验、性价比碾压' },
      { id:'q3_2', label:'竞品最常见的"坑"是什么？', hint:'比如：强制购物、隐形消费、住宿降级、导游不专业' },
      { id:'q3_3', label:'你有客户好评截图或实拍素材吗？一般发几张？', hint:'有素材的话，聊天时更有说服力' },
      { id:'q3_4', label:'用一句话形容"跟你们走 vs 跟别人走"的区别', hint:'这将成为你的核心销售主张' }
    ]
  },
  {
    id:4, title:'异议处理', icon:'🛡️',
    subtitle:'不要反驳不要降价，把顾虑变成信任',
    templates: [
      { label:'应对"太贵了"', text:'"姐您说得对，确实比市面上贵了一点。但贵出来的部分是 [独家的XX体验]，这个您自己在任何平台都订不到的。要不我帮您把方案里的 [非核心项目] 去掉，省 [金额]，核心体验完全不受影响？"' },
      { label:'应对"我再考虑考虑"', text:'"完全理解，旅游是大事，该好好想。不过跟您说实话，您看中的 [房型/出发日期]，目前只剩 [X] 个名额了。我先帮您占个位，不去的定金随时退，过了明天中午这个价格就锁不住了。"' },
      { label:'应对"我要跟家人商量"', text:'"当然当然，跟家人商量是应该的。要不这样，我拉个群把您家人也拉进来？有任何问题我一起解答，免得您转述不清楚。或者我发一段语音介绍，您直接转发给家人听？"' },
      { label:'应对"别家比你们便宜"', text:'"姐我理解您会多方比较。您方便告诉我别家报的是什么行程吗？我帮您看看是不是同一个标准——很多时候看着价格低，到了当地各种加钱，最后花的更多。您把行程发我，我帮您对比。"' }
    ],
    questions: [
      { id:'q4_1', label:'顾客最常说的拒绝理由是什么？（列出前3名）', hint:'比如：太贵了、我再考虑考虑、要跟家人商量、别家更便宜' },
      { id:'q4_2', label:'当顾客说贵的时候，你们有什么实际差异点可以讲？', hint:'不要说"我们服务好"这种空话，要具体的：比如住宿级别、餐饮标准' },
      { id:'q4_3', label:'你们的定金能退吗？退定金的条件是什么？', hint:'这个直接影响你的逼单话术' },
      { id:'q4_4', label:'有没有顾客因为"比价"跑掉的真实案例？最后怎么发现的？', hint:'复盘失败案例，找到自己的短板' }
    ]
  },
  {
    id:5, title:'促成逼单', icon:'🎯',
    subtitle:'给选择题不给填空题，用稀缺性和利益点推动决策',
    templates: [
      { label:'日期选择题', text:'"[称呼]，我帮您查了一下，下月 [日期A] 和 [日期B] 两个团，刚好住宿免费升级 [升级内容]。您看哪个更适合？我先帮您锁定，不用马上付款。"' },
      { label:'名额稀缺', text:'"跟您实话说，[某房型/某团期] 只剩 [X] 个位置了。这条线是我们的王牌产品，每次直播都是最先抢完的。要不我先帮您预留到明天？"' },
      { label:'价格窗口', text:'"刚接到通知，下个月 [某费用] 要涨。您今天定下来就是现在的价格，能省 [金额]。"' },
      { label:'风险逆转', text:'"这样吧姐，您先付个定金把名额锁了。出发前7天如果不去了，定金全额退。但到时候再定，这个价格和房型我保证不了。"' }
    ],
    questions: [
      { id:'q5_1', label:'你们产品有什么真正的稀缺性？', hint:'比如：限量房型、季节限定体验、名额有限的小团、独家资源' },
      { id:'q5_2', label:'定金一般收多少？不去的退款政策是什么？', hint:'知道这两个数字才能设计逼单话术' },
      { id:'q5_3', label:'你一般在什么时机开口逼单？聊到第几次？', hint:'时机太早赶客，太晚流失' },
      { id:'q5_4', label:'逼单时顾客最常说什么？你的第一反应是什么？', hint:'反思自己当下反应是否有效' }
    ]
  },
  {
    id:6, title:'跟单节奏', icon:'🔄',
    subtitle:'保持存在感但不招人烦，用价值激活而不是催促',
    templates: [
      { label:'5次触达节奏', text:'Day 1（下单当天）：微信文字+语音 → 开场破冰自报家门\nDay 2：微信文字 → 需求挖掘（5个问题）\nDay 3-4：微信图文 → 发定制方案+实拍素材\nDay 5：微信文字 → 跟进方案反馈，第一次逼单\nDay 7（如沉默）：微信图片 → 发实拍+限时信息激活\n\n黄金法则：每次触达必须带价值，绝不能纯问候' }
    ],
    questions: [
      { id:'q6_1', label:'你目前跟一个客户的节奏是什么样的？', hint:'几天跟一次？跟几次就放弃了？如实写' },
      { id:'q6_2', label:'你有哪些素材可以发？', hint:'实拍图、好评截图、酒店视频、目的地攻略等' },
      { id:'q6_3', label:'你有没有因为"跟太紧"把顾客跟跑的经历？', hint:'反思一下，大概什么频率顾客会嫌烦' },
      { id:'q6_4', label:'你手上现在有多少沉默客户？对他们你打算怎么办？', hint:'大概数量即可，想想怎么激活他们' }
    ]
  },
  {
    id:7, title:'签约后 & 转介绍', icon:'🤝',
    subtitle:'让已签约顾客成为你的口碑传播者',
    templates: [
      { label:'行前7天', text:'"[称呼]，您的 [目的地] 之旅马上出发啦！这是帮您整理的出行清单和当地天气，有备无患～"' },
      { label:'行前1天', text:'"明天出发啦，祝您玩得开心！我的电话24小时开机，旅途中有任何问题随时找我。"' },
      { label:'归来14天回访', text:'"欢迎回家！上次玩得开心吗？有没有什么让您印象特别深的？方便的话帮我写两句话评价，下次出行给您专属老客优惠～"' }
    ],
    questions: [
      { id:'q7_1', label:'已经出行的客户，你有主动回访过吗？回访率大概多少？', hint:'估计一下即可' },
      { id:'q7_2', label:'有没有老客户帮你介绍新客户的案例？怎么发生的？', hint:'找到成功模式的共同点' },
      { id:'q7_3', label:'你们现在有没有老客户优惠政策？', hint:'比如：老客折扣、推荐返利、积分兑换等' }
    ]
  }
];

const STORAGE_KEY = 'sales_framework_answers';
let answers = {};

function loadAnswers() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { answers = JSON.parse(raw); } catch(e) {} }
}
function saveAnswers() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
}
function toast(msg) {
  const el = document.createElement('div'); el.className='toast success'; el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

// ============ 当前步骤 ============
let currentStep = 0;

function render() {
  const step = STEPS[currentStep];
  const totalQ = STEPS.reduce((s,st)=>s+st.questions.length, 0);
  const answeredQ = STEPS.reduce((s,st)=>s+st.questions.filter(q=>answers[q.id]&&answers[q.id].trim()).length, 0);

  // Check which steps are "done"
  const stepStatus = STEPS.map(st=>{
    const total = st.questions.length;
    const answered = st.questions.filter(q=>answers[q.id]&&answers[q.id].trim()).length;
    return { id:st.id, done:answered===total && total>0, answered, total };
  });

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <h1>📝 旅游销售沟通框架 · 工作坊</h1>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="exportAnswers()">📤 导出我的答案</button>
        <button class="btn btn-danger btn-sm" onclick="resetAll()">🗑️ 清空重填</button>
      </div>
    </div>

    <div class="step-nav">
      ${STEPS.map((st,i)=>`
        <button class="${i===currentStep?'active':''} ${stepStatus[i].done?'done':''}"
          onclick="switchStep(${i})">
          ${st.icon} ${st.title}
          <span style="font-size:10px;color:var(--text-secondary)">${stepStatus[i].answered}/${stepStatus[i].total}</span>
        </button>
      `).join('')}
    </div>

    <div class="progress-bar"><div class="fill" style="width:${totalQ>0?Math.round(answeredQ/totalQ*100):0}%"></div></div>
    <div style="text-align:center;font-size:12px;color:var(--text-secondary);margin-bottom:16px">
      总进度：${answeredQ}/${totalQ} 题已答（${totalQ>0?Math.round(answeredQ/totalQ*100):0}%）
    </div>

    <div class="card">
      <h2>${step.icon} 第${step.id}步：${step.title}</h2>
      <div class="subtitle">${step.subtitle}</div>

      <div class="info-box">
        <strong>你的理解：</strong>${getStepSummary(step.id)}
      </div>

      ${step.templates.map(t=>`
        <div class="template-box">
          <div class="label">📋 ${t.label}</div>
          ${t.text}
        </div>
      `).join('')}

      <h3>✏️ 请填写以下问题（你的真实情况）</h3>
      ${step.questions.map((q,idx)=>`
        <div class="form-group">
          <label><span class="q-num">${idx+1}</span> ${q.label}</label>
          <textarea
            id="input-${q.id}"
            class="${answers[q.id]&&answers[q.id].trim()?'filled':''}"
            placeholder="在此输入你的回答..."
            oninput="onAnswerChange('${q.id}', this.value)"
            onblur="onAnswerBlur('${q.id}', this.value)"
          >${answers[q.id]||''}</textarea>
          <div class="hint">💡 ${q.hint}</div>
        </div>
      `).join('')}
    </div>

    <div class="bottom-bar">
      <button class="btn btn-outline" ${currentStep===0?'disabled':''} onclick="switchStep(${currentStep-1})">
        ← 上一步
      </button>
      <span class="progress">第 ${currentStep+1} / ${STEPS.length} 步</span>
      ${currentStep < STEPS.length-1 ? `
        <button class="btn btn-primary" onclick="switchStep(${currentStep+1})">
          下一步：${STEPS[currentStep+1].title} →
        </button>
      ` : `
        <button class="btn btn-success" onclick="exportAnswers()">
          ✅ 完成！导出我的完整框架
        </button>
      `}
    </div>
  `;
}

function getStepSummary(stepId) {
  const map = {
    1:'不能一上来就问"什么时候去"，要建立连接、给价值、不加压力。',
    2:'用开放式问题问出真实需求，不要做填空题。',
    3:'不要让顾客比较价格，要让顾客想象体验。用FAB法则。',
    4:'三步法：先共情，再把价格转化成价值，最后给灵活选项。',
    5:'不要问"您定不定"，要给"A还是B"，附加时间限制。',
    6:'不要问"在吗""考虑得怎么样"，要发素材、发价值信息、发限时提醒。',
    7:'签约不是结束，是长期关系的开始。行前关怀→行中待命→归来回访→要好评→要转介绍。'
  };
  return map[stepId] || '';
}

function switchStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  // Save any unsaved inputs before switching
  saveCurrentInputs();
  currentStep = idx;
  render();
  // Scroll to top
  window.scrollTo(0,0);
}

function onAnswerChange(qid, value) {
  answers[qid] = value;
}

function onAnswerBlur(qid, value) {
  answers[qid] = value;
  saveAnswers();
  // Update the textarea class
  const el = document.getElementById('input-'+qid);
  if (el) {
    if (value.trim()) el.classList.add('filled');
    else el.classList.remove('filled');
  }
  // Re-render nav to update step completion status
  updateNavOnly();
  toast('已自动保存 ✓');
}

function saveCurrentInputs() {
  STEPS[currentStep].questions.forEach(q=>{
    const el = document.getElementById('input-'+q.id);
    if (el) { answers[q.id] = el.value; }
  });
  saveAnswers();
}

function updateNavOnly() {
  // Lightweight update of step nav buttons
  const stepStatus = STEPS.map(st=>{
    const total = st.questions.length;
    const answered = st.questions.filter(q=>answers[q.id]&&answers[q.id].trim()).length;
    return { id:st.id, done:answered===total && total>0, answered, total };
  });
  const nav = document.querySelector('.step-nav');
  if (!nav) return;
  const buttons = nav.querySelectorAll('button');
  buttons.forEach((btn,i)=>{
    if (i >= STEPS.length) return;
    const st = stepStatus[i];
    btn.className = `${i===currentStep?'active':''} ${st.done?'done':''}`;
    const span = btn.querySelector('span');
    if (span) span.textContent = `${st.answered}/${st.total}`;
  });
  // Update progress bar
  const totalQ = STEPS.reduce((s,st)=>s+st.questions.length, 0);
  const answeredQ = STEPS.reduce((s,st)=>s+st.questions.filter(q=>answers[q.id]&&answers[q.id].trim()).length, 0);
  const fill = document.querySelector('.progress-bar .fill');
  if (fill) fill.style.width = `${totalQ>0?Math.round(answeredQ/totalQ*100):0}%`;
}

// ============ Export ============
function exportAnswers() {
  saveCurrentInputs();
  let output = '';
  STEPS.forEach(step=>{
    output += `\n${'='.repeat(60)}\n`;
    output += `第${step.id}步：${step.title}\n`;
    output += `${'='.repeat(60)}\n\n`;
    output += `【目标】${step.subtitle}\n\n`;

    output += `【话术模板】\n`;
    step.templates.forEach(t=>{
      output += `--- ${t.label} ---\n${t.text}\n\n`;
    });

    output += `【我的回答】\n`;
    step.questions.forEach((q,idx)=>{
      const ans = answers[q.id] || '（未填写）';
      output += `${idx+1}. ${q.label}\n   答：${ans}\n\n`;
    });
  });

  output += `\n${'='.repeat(60)}\n`;
  output += `导出时间：${new Date().toLocaleString()}\n`;
  output += `完成度：${STEPS.reduce((s,st)=>s+st.questions.filter(q=>answers[q.id]&&answers[q.id].trim()).length, 0)} / ${STEPS.reduce((s,st)=>s+st.questions.length, 0)} 题\n`;

  const blob = new Blob([output], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `销售框架_我的答案_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  toast('导出成功！');
}

function resetAll() {
  if (!confirm('确定要清空所有已填写的答案吗？此操作不可恢复。建议先导出备份。')) return;
  answers = {};
  saveAnswers();
  currentStep = 0;
  render();
  toast('已清空，从头开始吧！');
}

// ============ Init ============
function init() {
  loadAnswers();
  render();
}

// Auto-save every 30 seconds
setInterval(()=>{
  saveCurrentInputs();
}, 30000);

// Warn before leaving
window.addEventListener('beforeunload', ()=>{
  saveCurrentInputs();
});

init();
</script>
